# 直接克隆到 OpenWrt package/custom 的源码包列表。
#
# 作用：
# - 这里的内容不会写入 feeds.conf.default，也不走 ./scripts/feeds 机制。
# - scripts/prepare-packages.sh 会在 feeds update/install 完成后，直接 git clone
#   指定仓库，并复制到 ImmortalWrt 源码目录下的目标目录。
#
# 适合放什么：
# - 单包仓库。
# - 不适合作为完整 OpenWrt feed 添加的仓库。
# - 需要覆盖上游 feeds 中同名包的第三方源码包。
#
# 和 *.feeds 的区别：
# - third-party.feeds/custom.feeds 是 OpenWrt feed，会产生 feed 名。
# - package-sources.conf 只是直接放源码到 package/custom，通常不会生成运行时
#   APK feed 源，也不会影响 /etc/apk/repositories.d/distfeeds.list。
#
# 注意：
# - 这里只是提供源码包，不代表软件包一定会内置进固件。
# - 是否内置由 profiles/<profile>/packages.txt 里的包名决定。
# - 如果要固定版本，可以把 ref 写成 tag、branch，或仓库可 fetch 到的 commit。
#
# 格式：
# <name> <repo-url> <ref> <destination-dir> <source-subdir>
#
# 字段说明：
# - name：日志显示用的名称，也作为临时 clone 目录名。
# - repo-url：源码仓库地址。
# - ref：分支、tag，或可被 git clone --branch 获取到的引用。
# - destination-dir：复制到 OpenWrt 源码目录下的目标路径。
# - source-subdir：仓库内要复制的子目录；使用 "." 表示复制仓库根目录。

